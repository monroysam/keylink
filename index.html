<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something's Waiting For You 🤫</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #f2cfc8;
      --rose: #c97b6e;
      --deep: #3a1f1a;
      --cream: #fdf6f0;
      --gold: #c9a96e;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      background-color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      overflow: hidden;
      position: relative;
    }
 
    /* Soft petal background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(242,207,200,0.45) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(201,123,110,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 55% 10%, rgba(201,169,110,0.15) 0%, transparent 40%);
      pointer-events: none;
    }
 
    /* Floating hearts */
    .heart-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .heart-bg span {
      position: absolute;
      bottom: -40px;
      font-size: 1.2rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    .heart-bg span:nth-child(1)  { left: 8%;  animation-duration: 7s;  animation-delay: 0s;   font-size: 0.9rem; }
    .heart-bg span:nth-child(2)  { left: 22%; animation-duration: 9s;  animation-delay: 1.5s; }
    .heart-bg span:nth-child(3)  { left: 38%; animation-duration: 6s;  animation-delay: 3s;   font-size: 0.7rem; }
    .heart-bg span:nth-child(4)  { left: 55%; animation-duration: 8s;  animation-delay: 0.8s; }
    .heart-bg span:nth-child(5)  { left: 70%; animation-duration: 10s; animation-delay: 2.2s; font-size: 0.8rem; }
    .heart-bg span:nth-child(6)  { left: 85%; animation-duration: 7s;  animation-delay: 4s; }
    .heart-bg span:nth-child(7)  { left: 15%; animation-duration: 11s; animation-delay: 5s;   font-size: 1rem; }
    .heart-bg span:nth-child(8)  { left: 62%; animation-duration: 8s;  animation-delay: 3.5s; font-size: 0.7rem; }
 
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
      10%  { opacity: 0.25; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-100vh) rotate(10deg); opacity: 0; }
    }
 
    /* Card */
    .card {
      position: relative;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(242,207,200,0.6);
      border-radius: 24px;
      padding: 52px 44px 48px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 4px 32px rgba(201,123,110,0.12),
        0 1px 0 rgba(255,255,255,0.9) inset;
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }
 
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
 
    .lock-icon {
      font-size: 2.6rem;
      margin-bottom: 16px;
      animation: pulse 2.5s ease-in-out infinite;
      display: block;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }
 
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.2rem;
      color: var(--deep);
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 10px;
    }
 
    .subtitle {
      font-size: 0.88rem;
      color: var(--rose);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 36px;
      font-weight: 300;
    }
 
    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
 
    input[type="password"] {
      width: 100%;
      padding: 14px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--deep);
      background: rgba(253,246,240,0.8);
      border: 1.5px solid rgba(242,207,200,0.8);
      border-radius: 50px;
      outline: none;
      text-align: center;
      letter-spacing: 0.15em;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input[type="password"]::placeholder {
      letter-spacing: 0.05em;
      color: #c4a8a2;
    }
    input[type="password"]:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(201,123,110,0.12);
    }
 
    button {
      width: 100%;
      padding: 14px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 400;
      color: white;
      background: linear-gradient(135deg, var(--rose) 0%, #b86a5e 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
      box-shadow: 0 4px 16px rgba(201,123,110,0.35);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 22px rgba(201,123,110,0.42);
      filter: brightness(1.05);
    }
    button:active {
      transform: translateY(0);
    }
 
    #message {
      margin-top: 14px;
      font-size: 0.82rem;
      color: #b86a5e;
      letter-spacing: 0.05em;
      min-height: 18px;
      font-style: italic;
    }
 
    /* Result */
    #result {
      display: none;
      margin-top: 32px;
      animation: revealIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes revealIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .result-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--deep);
      margin-bottom: 14px;
    }
 
    .track-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: linear-gradient(135deg, var(--gold) 0%, #b8924e 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
      box-shadow: 0 4px 16px rgba(201,169,110,0.35);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .track-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 22px rgba(201,169,110,0.45);
    }
 
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blush), transparent);
      margin: 28px auto 0;
    }
  </style>
</head>
<body>
 
  <div class="heart-bg">
    <span>🤍</span><span>🌸</span><span>🤍</span><span>🌷</span>
    <span>🤍</span><span>🌸</span><span>🌷</span><span>🤍</span>
  </div>
 
  <div class="card">
    <span class="lock-icon">🔒</span>
    <h1>Something's Waiting For You</h1>
    <p class="subtitle">Enter the secret code to reveal</p>
 
    <div class="input-wrap">
      <input type="password" id="passcode" placeholder="your secret code…" />
    </div>
    <p style="font-size:0.76rem; color:#c4a8a2; letter-spacing:0.04em; margin-bottom:14px; font-style:italic;">
      💡 Hint: all lowercase, no spaces
    </p>
 
    <button onclick="checkCode()">Unlock ✨</button>
 
    <p id="message"></p>
 
    <div id="result">
      <div class="result-label">Click here to see what the fuss is about</div>
      <a class="track-btn" href="https://tools.usps.com/go/TrackConfirmAction?qtc_tLabels1=9405530109355307803301" target="_blank">
        CLICK MEEE!!!
      </a>
      <div class="divider"></div>
    </div>
  </div>
 
  <script>
    const correctCode = "operationcarepackage";
 
    function checkCode() {
      const entered = document.getElementById("passcode").value;
      const result  = document.getElementById("result");
      const message = document.getElementById("message");
      const lock    = document.querySelector(".lock-icon");
 
      if (entered === correctCode) {
        result.style.display = "block";
        message.textContent  = "";
        lock.textContent     = "🔓";
      } else {
        result.style.display = "none";
        message.textContent  = "GUHHH...sorry not it";
      }
    }
 
    document.getElementById("passcode").addEventListener("keydown", e => {
      if (e.key === "Enter") checkCode();
    });
  </script>
</body>
</html>
